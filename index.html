<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Франшиза — Мережа Магазинів</title>
    
    <style>
        :root {
            --primary-color: #2563eb; /* Синій колір */
            --bg-color: #f1f5f9;
            --card-bg: #ffffff;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background-color: var(--bg-color);
            margin: 0;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .container {
            max-width: 500px;
            width: 100%;
        }

        header {
            text-align: center;
            margin-bottom: 30px;
        }

        .card {
            background: var(--card-bg);
            padding: 25px;
            border-radius: 20px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.1);
        }

        h2 { color: #1e293b; margin-top: 0; }

        .field {
            margin-bottom: 20px;
        }

        label {
            display: block;
            font-weight: 600;
            margin-bottom: 8px;
            color: #475569;
        }

        select {
            width: 100%;
            padding: 12px;
            border: 2px solid #e2e8f0;
            border-radius: 10px;
            font-size: 16px; /* Запобігає зуму на iPhone */
            background-color: #fff;
        }

        .result {
            background: #f8fafc;
            border: 2px dashed #cbd5e1;
            padding: 20px;
            border-radius: 12px;
            text-align: center;
            margin-top: 10px;
        }

        .price {
            font-size: 28px;
            font-weight: 800;
            color: var(--primary-color);
            display: block;
        }

        .breakdown {
            font-size: 14px;
            color: #64748b;
            margin-top: 10px;
            line-height: 1.5;
        }
    </style>
</head>
<body>

<div class="container">
    <header>
        <h1>Franchise Pro</h1>
        <p>Розрахуйте свій бізнес за 1 хвилину</p>
    </header>

    <div class="card">
        <h2>Калькулятор інвестицій</h2>

        <div class="field">
            <label for="type">Тип франшизи:</label>
            <select id="type">
                <option value="coffee" data-fee="5000" data-equip="7000">Кав'ярня ($5,000 внесок)</option>
                <option value="shop" data-fee="8000" data-equip="12000">Магазин одягу ($8,000 внесок)</option>
                <option value="salon" data-fee="10000" data-equip="15000">Салон краси ($10,000 внесок)</option>
            </select>
        </div>

        <div class="field">
            <label for="city">Ваше місто:</label>
            <select id="city">
                <option value="1.5">Київ (Коефіцієнт 1.5)</option>
                <option value="1.2">Обласний центр (Коефіцієнт 1.2)</option>
                <option value="1.0">Мале місто (Коефіцієнт 1.0)</option>
            </select>
        </div>

        <div class="result">
            <span>Орієнтовний старт:</span>
            <span class="price" id="totalPrice">$0</span>
            <div class="breakdown" id="breakdown">
                Оберіть параметри для розрахунку
            </div>
        </div>
    </div>
</div>

<script>
    const typeSelect = document.getElementById('type');
    const citySelect = document.getElementById('city');
    const priceDisplay = document.getElementById('totalPrice');
    const breakdownDisplay = document.getElementById('breakdown');

    function updatePrice() {
        // Отримуємо дані з вибраної франшизи
        const selectedOption = typeSelect.options[typeSelect.selectedIndex];
        const fee = parseFloat(selectedOption.dataset.fee);
        const equip = parseFloat(selectedOption.dataset.equip);
        
        // Отримуємо коефіцієнт міста
        const multiplier = parseFloat(citySelect.value);
        
        // Базова вартість оренди (приблизна)
        const baseRent = 2000;
        const finalRent = baseRent * multiplier;

        // Підсумкова сума
        const total = fee + equip + finalRent;

        // Оновлюємо текст на екрані
        priceDisplay.innerText = '$' + total.toLocaleString();
        
        breakdownDisplay.innerHTML = `
            Внесок: $${fee.toLocaleString()} | 
            Обладнання: $${equip.toLocaleString()} | 
            Оренда: ~$${finalRent.toLocaleString()}
        `;
    }

    // Запускаємо розрахунок при зміні будь-якого поля
    typeSelect.addEventListener('change', updatePrice);
    citySelect.addEventListener('change', updatePrice);

    // Викликаємо функцію відразу при завантаженні
    updatePrice();
</script>

</body>
</html>
